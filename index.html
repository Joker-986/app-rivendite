<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#033d6b" />
    <link rel="manifest" href="/manifest.json" />
    <title>Ricerca Rivendite Tabacchi</title>
    <script>
      // Prevent polyfills from attempting to overwrite window.fetch
      if (typeof window !== 'undefined' && window.fetch) {
        const originalFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: () => originalFetch,
            set: () => { console.warn('Attempted to overwrite window.fetch - ignored.'); },
            configurable: false
          });
        } catch (e) {
          console.warn('Could not lock window.fetch:', e);
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
